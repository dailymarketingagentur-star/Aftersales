<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Passwort zuruecksetzen</title>
</head>
<body style="font-family: sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h1 style="color: #333;">Passwort zuruecksetzen</h1>
    <p>Hallo,</p>
    <p>Sie haben angefordert, Ihr Passwort zurueckzusetzen.</p>
    <p>
        <a href="{{ password_reset_url }}"
           style="display: inline-block; padding: 12px 24px; background-color: #000; color: #fff; text-decoration: none; border-radius: 6px;">
            Neues Passwort setzen
        </a>
    </p>
    <p style="color: #666; font-size: 14px;">
        Falls Sie diese Anfrage nicht gestellt haben, koennen Sie diese E-Mail ignorieren.
    </p>
</body>
</html>
